services:
  postgres:
    image: postgres:16-alpine
    container_name: concert_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: concert_tickets
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: concert_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: concert_backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:password@postgres:5432/concert_tickets
      REDIS_URL: redis://redis:6379
      JWT_SECRET: prod-secret-key-change-this-in-real-production
      HOLD_DURATION_MINUTES: 5
      FRONTEND_URL: http://localhost:5173
      RATE_LIMIT_MAX: '10000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npx prisma db push --skip-generate && node dist/prisma/seed.js && npm start"
    healthcheck:
      test:
        ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: concert_frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
